<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --accent: #7c6aff;
      --accent-hover: #9585ff;
      --text: #e8e8f0;
      --muted: #666680;
      --danger: #ff5f5f;
      --done: #3a3a45;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 60px 16px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: var(--accent);
    }

    .input-row input::placeholder {
      color: var(--muted);
    }

    .input-row button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: var(--accent-hover);
    }

    .filters {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .filters button {
      background: none;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filters button:hover {
      color: var(--text);
    }

    .filters button.active {
      border-color: var(--border);
      color: var(--text);
      background: var(--surface);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      transition: opacity 0.2s;
    }

    .item.done {
      opacity: 0.5;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .checkbox:hover {
      border-color: var(--accent);
    }

    .item.done .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox svg {
      display: none;
    }

    .item.done .checkbox svg {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      opacity: 0;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .item:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:hover {
      color: var(--danger);
      background: rgba(255, 95, 95, 0.1);
    }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.82rem;
      transition: color 0.15s;
    }

    .clear-btn:hover {
      color: var(--danger);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 48px 0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TODO<span>.</span></h1>

    <div class="input-row">
      <input id="newTodo" type="text" placeholder="할 일을 입력하세요..." maxlength="200">
      <button onclick="addTodo()">추가</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">전체</button>
      <button onclick="setFilter('active', this)">진행 중</button>
      <button onclick="setFilter('done', this)">완료</button>
    </div>

    <div class="list" id="list"></div>

    <div class="footer">
      <span id="count"></span>
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('list');
      const filtered = todos.filter(t =>
        filter === 'all' ? true :
        filter === 'active' ? !t.done :
        t.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">항목이 없습니다</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <div class="item ${t.done ? 'done' : ''}" data-id="${t.id}">
            <div class="checkbox" onclick="toggle(${t.id})">
              <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                <path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="item-text">${escHtml(t.text)}</span>
            <button class="delete-btn" onclick="remove(${t.id})" title="삭제">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        `).join('');
      }

      const active = todos.filter(t => !t.done).length;
      document.getElementById('count').textContent = `${active}개 남음`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('newTodo');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('newTodo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
